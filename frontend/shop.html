<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Collection — TimeLux</title>
  <link rel="stylesheet" href="src/styles/apple.css"/>
  <style>
    body{background:var(--bg)}
    .page-wrap{padding:var(--s8) 0 calc(var(--bottom-nav-h) + var(--s10))}
    .shop-header{margin-bottom:var(--s6)}
    .shop-title{font-size:var(--text-2xl);font-weight:600;letter-spacing:-.03em;margin-bottom:var(--s2)}
    .shop-count{font-size:var(--text-sm);color:var(--text-secondary)}
    .filter-row{display:flex;align-items:center;justify-content:space-between;gap:var(--s4);margin-bottom:var(--s8);flex-wrap:wrap}
    .filter-pills{display:flex;gap:var(--s2);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
    .filter-pills::-webkit-scrollbar{display:none}
    .pill{flex-shrink:0;padding:7px 16px;border:1px solid var(--border);border-radius:var(--r-full);font-size:var(--text-xs);font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all var(--t-fast);white-space:nowrap;background:var(--bg)}
    .pill:hover{border-color:var(--text-primary);color:var(--text-primary)}
    .pill.active{background:var(--text-primary);border-color:var(--text-primary);color:white}
    .sort-select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--r-md);font-size:var(--text-xs);color:var(--text-secondary);cursor:pointer;background:var(--bg)}
    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--s6)}
    @media(max-width:640px){.products-grid{grid-template-columns:repeat(2,1fr);gap:var(--s4)}}
    .product-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;transition:box-shadow var(--t-base),transform var(--t-base);animation:fadeUp .4s var(--ease) both}
    .product-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
    .product-img-wrap{aspect-ratio:1;background:var(--bg-tertiary);overflow:hidden;position:relative}
    .product-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease)}
    .product-card:hover .product-img-wrap img{transform:scale(1.04)}
    .product-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary)}
    .sold-out-tag{position:absolute;top:var(--s3);right:var(--s3)}
    .product-body{padding:var(--s4)}
    .product-brand{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:var(--s1)}
    .product-name{font-size:var(--text-base);font-weight:500;color:var(--text-primary);letter-spacing:-.01em;margin-bottom:var(--s3);line-height:1.3}
    .product-price{font-size:var(--text-md);font-weight:500;color:var(--text-primary);letter-spacing:-.02em}
    .empty-state{grid-column:1/-1;text-align:center;padding:var(--s20) var(--s6)}
    .empty-state h3{font-size:var(--text-lg);font-weight:500;margin-bottom:var(--s2)}
  </style>
</head>
<body>

  <div id="nav-wrap"></div>

  <main class="page-wrap">
    <div class="container">
      <div class="shop-header animate-fade-up">
        <h1 class="shop-title">Collection</h1>
        <p class="shop-count" id="product-count">Loading…</p>
      </div>

      <div class="filter-row animate-fade-up delay-1">
        <div class="filter-pills" id="brand-pills">
          <button class="pill active" data-brand="" onclick="setFilter('')">All</button>
        </div>
        <select class="sort-select" id="sort-select">
          <option value="created_at:desc">Newest</option>
          <option value="price:asc">Price: Low to High</option>
          <option value="price:desc">Price: High to Low</option>
          <option value="name:asc">Name A–Z</option>
        </select>
      </div>

      <div class="products-grid" id="products-grid">
        <div class="product-card"><div class="skeleton" style="aspect-ratio:1"></div><div style="padding:var(--s4);display:flex;flex-direction:column;gap:var(--s2)"><div class="skeleton" style="height:10px;width:50%"></div><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:14px;width:40%"></div></div></div>
<div class="product-card"><div class="skeleton" style="aspect-ratio:1"></div><div style="padding:var(--s4);display:flex;flex-direction:column;gap:var(--s2)"><div class="skeleton" style="height:10px;width:50%"></div><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:14px;width:40%"></div></div></div>
<div class="product-card"><div class="skeleton" style="aspect-ratio:1"></div><div style="padding:var(--s4);display:flex;flex-direction:column;gap:var(--s2)"><div class="skeleton" style="height:10px;width:50%"></div><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:14px;width:40%"></div></div></div>
<div class="product-card"><div class="skeleton" style="aspect-ratio:1"></div><div style="padding:var(--s4);display:flex;flex-direction:column;gap:var(--s2)"><div class="skeleton" style="height:10px;width:50%"></div><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:14px;width:40%"></div></div></div>
<div class="product-card"><div class="skeleton" style="aspect-ratio:1"></div><div style="padding:var(--s4);display:flex;flex-direction:column;gap:var(--s2)"><div class="skeleton" style="height:10px;width:50%"></div><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:14px;width:40%"></div></div></div>
<div class="product-card"><div class="skeleton" style="aspect-ratio:1"></div><div style="padding:var(--s4);display:flex;flex-direction:column;gap:var(--s2)"><div class="skeleton" style="height:10px;width:50%"></div><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:14px;width:40%"></div></div></div>
<div class="product-card"><div class="skeleton" style="aspect-ratio:1"></div><div style="padding:var(--s4);display:flex;flex-direction:column;gap:var(--s2)"><div class="skeleton" style="height:10px;width:50%"></div><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:14px;width:40%"></div></div></div>
<div class="product-card"><div class="skeleton" style="aspect-ratio:1"></div><div style="padding:var(--s4);display:flex;flex-direction:column;gap:var(--s2)"><div class="skeleton" style="height:10px;width:50%"></div><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:14px;width:40%"></div></div></div>
    </div>
  </main>

  <div id="bottom-nav-wrap"></div>

  <script src="config.js"></script>
  <script src="src/utils/core.js"></script>
  <script>
    let allProducts = [], activeBrand = '', activeSort = 'created_at:desc';

    (async () => {
      const ok = await AuthGuard.require();
      if (!ok) return;
      document.getElementById('nav-wrap').innerHTML = Nav.renderAuth();
      document.getElementById('bottom-nav-wrap').innerHTML = Nav.renderBottom('home');
      Cart.updateBadge();
      await loadProducts();
    })();

    async function loadProducts() {
      const [col, dir] = activeSort.split(':');
      const params = new URLSearchParams({ sort: col, order: dir, limit: 100 });
      if (activeBrand) params.set('brand', activeBrand);
      try {
        allProducts = await api.get(`/products?${params}`);
        renderBrandPills();
        renderProducts(allProducts);
      } catch(err) {
        document.getElementById('products-grid').innerHTML =
          `<div class="empty-state"><h3>Failed to load</h3><p style="color:var(--text-secondary)">${err.message}</p></div>`;
      }
    }

    function renderProducts(list) {
      document.getElementById('product-count').textContent = `${list.length} timepiece${list.length!==1?'s':''}`;
      const grid = document.getElementById('products-grid');
      if (!list.length) {
        grid.innerHTML = `<div class="empty-state"><h3>No watches found</h3><p style="color:var(--text-secondary)">Try a different filter.</p></div>`;
        return;
      }
      grid.innerHTML = list.map((p,i) => {
        const img = p.images?.[0]?.url;
        const soldOut = p.stock_qty === 0;
        return `
        <div class="product-card animate-fade-up" style="animation-delay:${i*.05}s"
             onclick="location.href='product.html?slug=${p.slug}'">
          <div class="product-img-wrap">
            ${img ? `<img src="${img}" alt="${p.name}" loading="lazy"/>` :
              `<div class="product-img-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div>`}
            ${soldOut ? `<div class="sold-out-tag"><span class="badge badge-neutral">Sold Out</span></div>` : ''}
          </div>
          <div class="product-body">
            <p class="product-brand">${p.brand_name||''}</p>
            <p class="product-name">${p.name}</p>
            <p class="product-price">${fmt.naira(p.price)}</p>
          </div>
        </div>`;
      }).join('');
    }

    function renderBrandPills() {
      const seen = new Set(), pills = document.getElementById('brand-pills');
      pills.innerHTML = `<button class="pill${!activeBrand?' active':''}" data-brand="" onclick="setFilter('')">All</button>`;
      allProducts.forEach(p => {
        if (p.brand_slug && !seen.has(p.brand_slug)) {
          seen.add(p.brand_slug);
          pills.innerHTML += `<button class="pill${activeBrand===p.brand_slug?' active':''}" data-brand="${p.brand_slug}" onclick="setFilter('${p.brand_slug}')">${p.brand_name}</button>`;
        }
      });
    }

    function setFilter(brand) {
      activeBrand = brand;
      renderBrandPills();
      loadProducts();
    }

    document.getElementById('sort-select')?.addEventListener('change', e => {
      activeSort = e.target.value; loadProducts();
    });
  </script>
</body>
</html>
