<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — TimeLux Admin</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="stylesheet" href="../src/styles/apple.css"/>
  <link rel="stylesheet" href="../src/styles/admin.css"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/></head>
<body style="background:var(--bg-secondary)">

<div class="admin-layout">
  <div id="layout-shell"></div>

  <main class="admin-main">
    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <span id="greeting" style="font-size:var(--text-sm);color:var(--text-secondary)"></span>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
       <div class="stat-card"><div class="skeleton" style="width:36px;height:36px;border-radius:var(--r-md);margin-bottom:var(--s4)"></div><div class="skeleton" style="height:10px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:28px;width:80%"></div></div>
<div class="stat-card"><div class="skeleton" style="width:36px;height:36px;border-radius:var(--r-md);margin-bottom:var(--s4)"></div><div class="skeleton" style="height:10px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:28px;width:80%"></div></div>
<div class="stat-card"><div class="skeleton" style="width:36px;height:36px;border-radius:var(--r-md);margin-bottom:var(--s4)"></div><div class="skeleton" style="height:10px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:28px;width:80%"></div></div>
<div class="stat-card"><div class="skeleton" style="width:36px;height:36px;border-radius:var(--r-md);margin-bottom:var(--s4)"></div><div class="skeleton" style="height:10px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:28px;width:80%"></div></div>
    </div>

    <!-- Dashboard grid -->
    <div class="dashboard-grid">
      <!-- Recent orders panel -->
      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Recent Orders</h2>
          <a href="/admin/orders.html" class="btn btn-ghost btn-sm">View All</a>
        </div>
        <div id="recent-orders-wrap">
          <div style="padding:var(--s6)"><div class="skeleton" style="height:200px;border-radius:var(--r-lg)"></div></div>
        </div>
      </div>

      <!-- Low stock panel -->
      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Low Stock</h2>
          <a href="/admin/products.html" class="btn btn-ghost btn-sm">Manage</a>
        </div>
        <div class="panel-body" id="low-stock-wrap">
          <div class="skeleton" style="height:200px;border-radius:var(--r-lg)"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../config.js"></script>
  <script src="../src/utils/core.js"></script>
<script src="../src/utils/admin-core.js"></script>
<script>
(async () => {
  const ok = await AuthGuard.requireAdmin();
  if (!ok) return;

  document.getElementById('layout-shell').outerHTML = AdminLayout.render('dashboard');
  document.getElementById('greeting').textContent =
    `Welcome back, ${window.__admin?.full_name?.split(' ')[0] || 'Admin'} 👋`;

  const [stats, recent, products] = await Promise.all([
    api.get('/admin/dashboard', true).catch(() => null),
    api.get('/admin/dashboard/recent-orders', true).catch(() => []),
    api.get('/products?limit=100&sort=stock_qty&order=asc').catch(() => []),
  ]);

  // Stats cards
  if (stats) {
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card animate-fade-up">
        <div class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
        <p class="stat-label">Total Revenue</p>
        <p class="stat-value">${fmt.naira(stats.revenue?.total||0)}</p>
      </div>
      <div class="stat-card animate-fade-up delay-1">
        <div class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg></div>
        <p class="stat-label">Total Orders</p>
        <p class="stat-value">${stats.orders?.total||0}</p>
      </div>
      <div class="stat-card animate-fade-up delay-2">
        <div class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-primary)" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
        <p class="stat-label">Customers</p>
        <p class="stat-value">${stats.customers||0}</p>
      </div>
      <div class="stat-card animate-fade-up delay-3">
        <div class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${(stats.low_stock||0)>0?'var(--error)':'var(--text-primary)'}" stroke-width="1.8"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <p class="stat-label">Low Stock</p>
        <p class="stat-value" style="color:${(stats.low_stock||0)>0?'var(--error)':'inherit'}">${stats.low_stock||0}</p>
      </div>`;
  }

  // Recent orders table — mobile-friendly (hide date on small screens)
  document.getElementById('recent-orders-wrap').innerHTML = recent.length ? `
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr>
          <th>Order</th>
          <th>Customer</th>
          <th>Amount</th>
          <th>Status</th>
          <th class="hide-mobile">Date</th>
        </tr></thead>
        <tbody>
          ${recent.map(o=>`
          <tr onclick="location.href='/admin/orders.html?id=${o.id}'">
            <td style="font-weight:600">${o.order_ref}</td>
            <td>${o.customer_name}</td>
            <td>${fmt.naira(o.total_amount)}</td>
            <td><span class="badge ${stBadge(o.status)}">${stLabel(o.status)}</span></td>
            <td class="hide-mobile" style="color:var(--text-secondary)">${fmt.date(o.created_at)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : `<div style="padding:var(--s8);text-align:center;color:var(--text-secondary)">No orders yet</div>`;

  // Low stock
  const low = products.filter(p => p.stock_qty <= 2 && p.is_active !== false);
  document.getElementById('low-stock-wrap').innerHTML = low.length ? low.map(p=>`
    <div class="stock-item">
      <div class="stock-thumb">${p.images?.[0]?.url?`<img src="${p.images[0].url}" alt=""/>`:''}  </div>
      <div class="stock-info"><p class="stock-name">${p.name}</p><p class="stock-brand">${p.brand_name||''}</p></div>
      <span class="stock-qty">${p.stock_qty} left</span>
    </div>`).join('')
    : `<p style="color:var(--text-secondary);font-size:var(--text-sm)">All items are well stocked.</p>`;
})();

function stBadge(s){const m={pending:'badge-neutral',payment_confirmed:'badge-blue',processing:'badge-blue',shipped:'badge-blue',delivered:'badge-success',cancelled:'badge-error'};return m[s]||'badge-neutral'}
function stLabel(s){return(s||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
</script>
</body>
</html>
