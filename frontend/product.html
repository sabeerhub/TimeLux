<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Product — TimeLux</title>
  <link rel="stylesheet" href="src/styles/apple.css"/>
  <style>
    body{background:var(--bg)}
    .page-wrap{padding:var(--s6) 0 calc(var(--bottom-nav-h) + var(--s10))}
    .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:var(--text-sm);color:var(--accent);margin-bottom:var(--s6)}
    .back-btn:hover{opacity:.75}
    .product-layout{display:grid;grid-template-columns:1fr 1fr;gap:var(--s12);align-items:start}
    @media(max-width:768px){.product-layout{grid-template-columns:1fr;gap:var(--s6)}}
            .gallery{position:sticky;top:calc(var(--nav-h) + var(--s4))}
@media(max-width:768px){.gallery{position:relative;top:0}}.thumb-row::-webkit-scrollbar{display:none}
    .main-img{aspect-ratio:1;background:var(--bg-tertiary);border-radius:var(--r-xl);overflow:hidden;margin-bottom:var(--s3)}
    .main-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
    .main-img:hover img{transform:scale(1.02)}
    .thumb-row{display:flex;gap:var(--s2);overflow-x:auto;padding-bottom:4px;padding-right:var(--s4);scrollbar-width:none;-ms-overflow-style:none}
    .thumb{width:72px;height:72px;border-radius:var(--r-md);border:2px solid transparent;overflow:hidden;cursor:pointer;transition:border-color var(--t-fast);flex-shrink:0;background:var(--bg-tertiary)}
    .thumb.active{border-color:var(--text-primary)}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .product-brand-tag{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:var(--s2)}
    .product-title{font-size:clamp(var(--text-xl),3vw,var(--text-3xl));font-weight:600;letter-spacing:-.03em;line-height:1.1;margin-bottom:var(--s4)}
    .product-status{margin-bottom:var(--s4)}
    .product-price-value{font-size:var(--text-2xl);font-weight:600;letter-spacing:-.03em;margin-bottom:var(--s6)}
    .product-desc{font-size:var(--text-md);color:var(--text-secondary);line-height:1.6;letter-spacing:-.01em;margin-bottom:var(--s8)}
    .specs-title{font-size:var(--text-xs);font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:var(--s4)}
    .specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4) var(--s6);margin-bottom:var(--s8)}
    .spec-label{font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:2px}
    .spec-value{font-size:var(--text-sm);font-weight:500}
    .cta-block{display:flex;flex-direction:column;gap:var(--s3)}
    .qty-row{display:flex;align-items:center;gap:var(--s4);margin-bottom:var(--s2)}
    .qty-label{font-size:var(--text-sm);color:var(--text-secondary)}
    .qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--r-full);overflow:hidden}
    .qty-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:var(--text-lg);color:var(--text-secondary);transition:background var(--t-fast);cursor:pointer}
    .qty-btn:hover{background:var(--bg-tertiary)}
    .qty-num{width:40px;text-align:center;font-size:var(--text-sm);font-weight:500}
    .img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary)}
  </style>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/></head>
<body>

  <div id="nav-wrap"></div>

  <main class="page-wrap">
    <div class="container">
      <a href="shop.html" class="back-btn animate-fade-up">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Collection
      </a>
      <div id="product-content">
        <div class="product-layout">
          <div class="skeleton" style="aspect-ratio:1;border-radius:var(--r-xl)"></div>
          <div style="display:flex;flex-direction:column;gap:var(--s4)">
            <div class="skeleton" style="height:12px;width:40%"></div>
            <div class="skeleton" style="height:40px;width:80%"></div>
            <div class="skeleton" style="height:32px;width:50%"></div>
            <div class="skeleton" style="height:80px"></div>
            <div class="skeleton" style="height:52px;border-radius:980px"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="bottom-nav-wrap"></div>

  <script src="config.js"></script>
  <script src="src/utils/core.js"></script>
  <script>
    let product = null, qty = 1;

    (async () => {
      const ok = await AuthGuard.require();
      if (!ok) return;
      document.getElementById('nav-wrap').innerHTML = Nav.renderAuth();
      document.getElementById('bottom-nav-wrap').innerHTML = Nav.renderBottom('collection');
      Cart.updateBadge();

      const slug = new URLSearchParams(location.search).get('slug');
      if (!slug) { location.href = 'shop.html'; return; }

      try {
        product = await api.get(`/products/${slug}`);
        renderProduct();
      } catch {
        document.getElementById('product-content').innerHTML =
          `<div style="text-align:center;padding:var(--s20) 0">
            <h2 style="margin-bottom:var(--s6)">Product not found</h2>
            <a href="shop.html" class="btn btn-primary">Back to Collection</a>
          </div>`;
      }
    })();

    function renderProduct() {
      document.title = `${product.name} — TimeLux`;
      const images = product.images || [];
      const soldOut = product.stock_qty === 0;
      const specs = [
        { label:'Movement', value:product.movement_type },
        { label:'Case Size', value:product.case_size_mm?`${product.case_size_mm}mm`:null },
        { label:'Case Material', value:product.case_material },
        { label:'Water Resistance', value:product.water_resistance },
      ].filter(s=>s.value);

      document.getElementById('product-content').innerHTML = `
      <div class="product-layout">
        <div class="gallery animate-fade-up">
          <div class="main-img">
            ${images[0]
              ? `<img src="${images[0].url}" alt="${product.name}" id="main-img-el"/>`
              : `<div class="img-placeholder"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div>`}
          </div>
          ${images.length>1?`<div class="thumb-row">${images.map((img,i)=>`
          <div class="thumb${i===0?' active':''}" onclick="setImg(${i})">
            <img src="${img.url}" alt=""/>
          </div>`).join('')}</div>`:''}
        </div>

        <div class="animate-fade-up delay-2">
          <p class="product-brand-tag">${product.brand_name||''}</p>
          <h1 class="product-title">${product.name}</h1>
          <div class="product-status">
            ${soldOut
              ? `<span class="badge badge-neutral">Sold Out</span>`
              : `<span class="badge badge-success"><svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="4"/></svg>In Stock</span>`}
          </div>
          <p class="product-price-value">${fmt.naira(product.price)}</p>
          <p class="product-desc">${product.description||''}</p>

          ${specs.length?`
          <p class="specs-title">Specifications</p>
          <div class="specs-grid">
            ${specs.map(s=>`<div><p class="spec-label">${s.label}</p><p class="spec-value">${s.value}</p></div>`).join('')}
          </div>`:''}

          <div class="cta-block">
            ${!soldOut?`
            <div class="qty-row">
              <span class="qty-label">Quantity</span>
              <div class="qty-ctrl">
                <button class="qty-btn" onclick="adjQty(-1)">−</button>
                <span class="qty-num" id="qty-display">1</span>
                <button class="qty-btn" onclick="adjQty(1)">+</button>
              </div>
            </div>
            <button class="btn btn-primary btn-full btn-lg" onclick="addToCart()">Add to Bag</button>
            <button class="btn btn-outline btn-full" onclick="buyNow()">Buy Now</button>
            `:`<button class="btn btn-secondary btn-full btn-lg" disabled>Sold Out</button>`}
          </div>
        </div>
      </div>`;
    }

    function setImg(i) {
      const el = document.getElementById('main-img-el');
      if (el) el.src = (product.images||[])[i].url;
      document.querySelectorAll('.thumb').forEach((t,j)=>t.classList.toggle('active',i===j));
    }
    function adjQty(d) {
      qty = Math.max(1, Math.min(10, qty+d));
      const el = document.getElementById('qty-display');
      if (el) el.textContent = qty;
    }
    function addToCart() {
      if (!product) return;
      Cart.add({ id:product.id, name:product.name, price:parseFloat(product.price),
        image:product.images?.[0]?.url||null, slug:product.slug, brand:product.brand_name }, qty);
    }
    function buyNow() { addToCart(); location.href = 'cart.html'; }
  </script>
</body>
</html>
