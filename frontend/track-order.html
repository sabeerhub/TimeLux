<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Track Order — TimeLux</title>
  <link rel="stylesheet" href="src/styles/apple.css"/>
  <style>
    body{background:var(--bg-secondary)}
    .page-wrap{padding:var(--s8) 0 160px;min-height:100dvh}
    .page-title{font-size:var(--text-2xl);font-weight:600;letter-spacing:-.03em;margin-bottom:var(--s2)}
    .page-sub{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--s8)}

    /* Search */
    .track-search{display:flex;gap:var(--s3);margin-bottom:var(--s8)}
    .track-search .field-input{flex:1;text-transform:uppercase;letter-spacing:.04em}

    /* Order card — matches design */
    .order-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:var(--s4);animation:scaleIn .3s var(--ease-spring)}

    /* Header row */
    .oc-header{padding:var(--s5) var(--s6);display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s4)}
    .oc-id{font-size:var(--text-md);font-weight:600;letter-spacing:-.02em;color:var(--text-primary)}
    .oc-date{font-size:var(--text-xs);color:var(--text-secondary);margin-top:4px}

    /* Timeline — matches uploaded design exactly */
    .timeline-section{padding:var(--s5) var(--s6);border-top:1px solid var(--border)}
    .timeline{display:flex;flex-direction:column;gap:0}
    .tl-step{display:flex;gap:var(--s4);position:relative}
    .tl-step:not(:last-child)::before{
      content:'';position:absolute;
      left:15px;top:28px;width:2px;
      height:calc(100% - 8px);
      background:var(--border);z-index:0;
    }
    .tl-step:not(:last-child).done::before{background:var(--accent)}
    .tl-dot-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0;z-index:1}
    .tl-dot{
      width:32px;height:32px;border-radius:50%;
      border:2px solid var(--border);background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      transition:all var(--t-base);flex-shrink:0;
    }
    .tl-dot.done{background:var(--accent);border-color:var(--accent)}
    .tl-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,113,227,.15)}
    .tl-dot.pending{background:var(--bg);border-color:var(--border)}
    .tl-content{padding-bottom:var(--s6);flex:1;padding-top:4px}
    .tl-title{font-size:var(--text-sm);font-weight:600;color:var(--text-primary)}
    .tl-title.pending{color:var(--text-tertiary);font-weight:400}
    .tl-meta{font-size:var(--text-xs);color:var(--text-secondary);margin-top:3px}
    .tl-note{font-size:var(--text-xs);color:var(--text-secondary);margin-top:4px}

    /* Order total */
    .oc-total-row{padding:var(--s4) var(--s6);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .oc-total-label{font-size:var(--text-sm);color:var(--text-secondary)}
    .oc-total-val{font-size:var(--text-md);font-weight:600}

    /* Items preview */
    .oc-items{padding:0 var(--s6) var(--s5);display:flex;gap:var(--s2)}
    .oc-thumb{width:52px;height:52px;border-radius:var(--r-md);background:var(--bg-tertiary);overflow:hidden;flex-shrink:0}
    .oc-thumb img{width:100%;height:100%;object-fit:cover}

    /* Support section — matches design */
    .support-section{padding:var(--s5) var(--s6);border-top:1px solid var(--border);display:flex;align-items:center;gap:var(--s4)}
    .support-icon{width:40px;height:40px;border-radius:50%;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .support-label{font-size:var(--text-xs);color:var(--text-secondary)}
    .support-action{font-size:var(--text-sm);font-weight:500;color:var(--accent);cursor:pointer}

    /* Empty */
    .empty-track{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-xl);text-align:center;padding:var(--s16)}
    .empty-track h3{font-size:var(--text-lg);font-weight:500;margin-bottom:var(--s2)}
  </style>
</head>
<body>

  <div id="nav-wrap"></div>

  <main class="page-wrap">
    <div class="container-sm">
      <h1 class="page-title animate-fade-up">Track Your Order</h1>
      <p class="page-sub animate-fade-up delay-1">Enter your order ID below to check delivery status.</p>

      <div class="track-search animate-fade-up delay-2">
        <input class="field-input" id="track-input" type="text" placeholder="ORD-2024-00045" autocomplete="off"/>
        <button class="btn btn-primary" onclick="searchOrder()">Track</button>
      </div>

      <div id="track-results"></div>
    </div>
  </main>

  <div id="bottom-nav-wrap"></div>

  <script src="config.js"></script>
  <script src="src/utils/core.js"></script>
  <script>
    const STEPS = [
      { key:'payment_confirmed', label:'Payment Confirmed', icon:'check' },
      { key:'processing',        label:'Processing',        icon:'gear' },
      { key:'shipped',           label:'Shipped',           icon:'truck' },
      { key:'delivered',         label:'Delivered',         icon:'box' },
    ];

    const STEP_ORDER = ['pending','payment_confirmed','processing','shipped','delivered'];

    (async () => {
      const ok = await AuthGuard.require();
      if (!ok) return;
      document.getElementById('nav-wrap').innerHTML = Nav.renderAuth();
      document.getElementById('bottom-nav-wrap').innerHTML = Nav.renderBottom('orders');
      Cart.updateBadge();

      const ref = new URLSearchParams(location.search).get('ref');
      if (ref) {
        document.getElementById('track-input').value = ref.toUpperCase();
        await searchOrder();
      } else {
        await loadMyOrders();
      }

      document.getElementById('track-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchOrder();
      });
    })();

    async function searchOrder() {
      const ref = document.getElementById('track-input').value.trim().toUpperCase();
      if (!ref) return;
      const container = document.getElementById('track-results');
      container.innerHTML = `<div class="skeleton" style="height:320px;border-radius:var(--r-xl)"></div>`;
      try {
        const order = await api.get(`/orders/${ref}`);
        container.innerHTML = renderCard(order);
      } catch {
        container.innerHTML = `<div class="empty-track"><h3>Order not found</h3><p style="color:var(--text-secondary)">Check the order ID and try again.</p></div>`;
      }
    }

    async function loadMyOrders() {
      try {
        const orders = await api.get('/orders/my-orders');
        if (!orders.length) {
          document.getElementById('track-results').innerHTML =
            `<div class="empty-track"><h3>No orders yet</h3><p style="color:var(--text-secondary)">Your orders will appear here after your first purchase.</p></div>`;
          return;
        }
        document.getElementById('track-results').innerHTML = orders.map(renderCard).join('');
      } catch {}
    }

    function renderCard(order) {
      const curIdx = STEP_ORDER.indexOf(order.status);
      const updates = order.tracking_updates || [];
      const items = order.items || [];

      // Build timeline rows matching the design
      const timelineHTML = STEPS.map((step, i) => {
        const stepIdx = STEP_ORDER.indexOf(step.key);
        const done   = curIdx > stepIdx;
        const active = curIdx === stepIdx;
        const pending = curIdx < stepIdx;
        const update = updates.find(u => u.status === step.key);

        const dotClass = done ? 'done' : active ? 'active' : 'pending';
        const checkIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>`;
        const stepClass = done ? '' : active ? '' : 'pending';

        return `
        <div class="tl-step${done?' done':''}">
          <div class="tl-dot-wrap">
            <div class="tl-dot ${dotClass}">
              ${done || active ? checkIcon : ''}
            </div>
          </div>
          <div class="tl-content">
            <p class="tl-title${pending?' pending':''}">${step.label}</p>
            ${update ? `<p class="tl-meta">${fmt.date(update.timestamp)} · ${fmt.time(update.timestamp)}</p>` : ''}
            ${update?.note ? `<p class="tl-note">${update.note}</p>` : ''}
          </div>
        </div>`;
      }).join('');

      return `
      <div class="order-card">
        <div class="oc-header">
          <div>
            <p style="font-size:var(--text-xs);color:var(--text-secondary);margin-bottom:4px;letter-spacing:.04em">ORDER ID</p>
            <p class="oc-id">${order.order_ref}</p>
            <p class="oc-date">Placed ${fmt.date(order.created_at)} · ${fmt.time(order.created_at)}</p>
          </div>
          <span class="badge ${statusBadge(order.status)}">${statusLabel(order.status)}</span>
        </div>

        ${items.length ? `
        <div class="oc-items">
          ${items.slice(0,4).map(it=>`
          <div class="oc-thumb">
            ${it.product_image?`<img src="${it.product_image}" alt=""/>`:''}
          </div>`).join('')}
          ${items.length>4?`<div class="oc-thumb flex-center" style="font-size:var(--text-xs);color:var(--text-secondary)">+${items.length-4}</div>`:''}
        </div>` : ''}

        <div class="timeline-section">
          <p style="font-size:var(--text-xs);font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:var(--s5)">Delivery Status</p>
          <div class="timeline">${timelineHTML}</div>
        </div>

        <div class="oc-total-row">
          <span class="oc-total-label">Total Paid</span>
          <span class="oc-total-val">${fmt.naira(order.total_amount)}</span>
        </div>

        <div class="support-section">
          <div class="support-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </div>
          <div>
            <p class="support-label">Need Help?</p>
            <p class="support-action" onclick="window.open('https://wa.me/2349070748980?text=Hi%2C%20I%20need%20help%20with%20my%20TimeLux%20order','_blank')">Chat with us</p>
          </div>
        </div>
      </div>`;
    }

    function statusBadge(s) {
      const m={pending:'badge-neutral',payment_confirmed:'badge-blue',processing:'badge-blue',shipped:'badge-blue',delivered:'badge-success',cancelled:'badge-error'};
      return m[s]||'badge-neutral';
    }
    function statusLabel(s) {
      return (s||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    }
  </script>
</body>
</html>
